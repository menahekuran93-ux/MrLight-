<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MarketMind — Swarm Intelligence</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Bebas+Neue&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#080c10;color:#e0e6ef;font-family:'IBM Plex Mono',monospace;min-height:100vh}
  header{border-bottom:1px solid #1a2030;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#080c10;z-index:10}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:4px;color:#00ff87}
  .status{font-size:10px;letter-spacing:2px;color:#2a3445;display:flex;align-items:center;gap:6px}
  .dot{width:7px;height:7px;border-radius:50%;background:#00ff87;animation:pulse 2s infinite}
  main{max-width:800px;margin:0 auto;padding:32px 16px}
  .label{font-size:10px;letter-spacing:3px;color:#2a3445;margin-bottom:8px}
  .input-row{display:flex;gap:10px;margin-bottom:10px}
  input{flex:1;background:#0d1117;border:1px solid #1a2030;color:#e0e6ef;padding:14px 16px;font-family:'IBM Plex Mono',monospace;font-size:14px;outline:none;border-radius:3px}
  input:focus{border-color:#00ff87}
  input::placeholder{color:#2a3445}
  input:disabled{opacity:0.4}
  button.run{background:#00ff87;color:#080c10;border:none;padding:14px 24px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer;border-radius:3px;white-space:nowrap}
  button.run:disabled{opacity:0.3;cursor:not-allowed}
  .examples{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
  .ex{background:transparent;border:1px solid #1a2030;color:#4a5568;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:5px 10px;cursor:pointer;border-radius:3px}
  .ex:hover{color:#00ff87;border-color:#00ff8740}
  .rounds{display:flex;gap:8px;margin-bottom:16px}
  .round-pill{padding:5px 14px;border-radius:2px;font-size:10px;letter-spacing:2px;border:1px solid #1a2030;color:#2a3445;transition:all 0.3s}
  .round-pill.active{border-color:#00ff8740;color:#00ff87;background:#00ff8710}
  .faction-bar{margin-bottom:20px}
  .faction-labels{display:flex;justify-content:space-between;font-size:11px;margin-bottom:6px}
  .bar{display:flex;height:10px;border-radius:5px;overflow:hidden;gap:2px}
  .bar-bull{background:#00ff87;transition:width 0.8s ease;box-shadow:0 0 10px #00ff8760}
  .bar-neut{background:#ffa502;transition:width 0.8s ease}
  .bar-bear{background:#ff4757;transition:width 0.8s ease}
  .flips{font-size:11px;color:#ffa502;margin-top:8px}
  .feed-title{font-size:10px;letter-spacing:3px;color:#2a3445;margin-bottom:12px}
  .feed{max-height:480px;overflow-y:auto;padding-right:4px}
  .card{border:1px solid #1a2030;border-radius:3px;padding:16px;margin-bottom:8px;animation:fadeUp 0.4s ease;background:#0d1117}
  .card-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
  .card-name{font-size:12px;font-weight:600;letter-spacing:1px}
  .badge{font-size:10px;padding:2px 8px;border-radius:2px}
  .card-meta{font-size:10px;color:#2a3445;margin-left:auto}
  .card-arg{font-size:13px;color:#8899aa;line-height:1.6;margin-bottom:6px}
  .card-signal{font-size:11px;color:#2a3445}
  .flipped-tag{font-size:10px;color:#ffa502;letter-spacing:1px}
  .verdict-box{border-radius:4px;padding:24px;margin-top:20px;animation:fadeUp 0.6s ease}
  .verdict-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .verdict-label{padding:4px 14px;border-radius:3px;font-size:13px;font-weight:700;margin-left:auto}
  .score-labels{display:flex;justify-content:space-between;font-size:10px;color:#2a3445;margin-bottom:4px}
  .score-num{font-size:18px;font-weight:700}
  .score-bar-bg{height:8px;background:#1a2030;border-radius:4px;overflow:hidden;margin-bottom:16px}
  .score-bar-fill{height:100%;border-radius:4px;transition:width 1.5s cubic-bezier(.16,1,.3,1)}
  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
  .stat{background:#0d1117;border-radius:3px;padding:12px;text-align:center}
  .stat-val{font-size:20px;font-weight:700}
  .stat-label{font-size:10px;color:#2a3445;letter-spacing:1px;margin-top:4px}
  .cases{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .case-title{font-size:10px;letter-spacing:2px;margin-bottom:8px}
  .case-arg{font-size:12px;color:#8899aa;line-height:1.6;margin-bottom:8px;border-left:2px solid;padding-left:10px}
  .verdict-footer{margin-top:16px;padding-top:14px;border-top:1px solid #1a2030;font-size:10px;color:#2a3445;text-align:center}
  .idle{text-align:center;padding:80px 0;color:#1a2030}
  .idle-icon{font-size:48px;margin-bottom:12px}
  .idle-text{font-size:11px;letter-spacing:3px}
  .error{background:#1a0a0a;border:1px solid #ff475740;border-radius:3px;padding:14px;font-size:12px;color:#ff4757;margin-bottom:16px;line-height:1.6;word-break:break-all}
  .loading{text-align:center;padding:40px 0;color:#2a3445}
  .spin{display:inline-block;animation:spin 1s linear infinite;font-size:32px}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>
<header>
  <div class="logo">MARKETMIND</div>
  <div class="status"><div class="dot"></div>1000 AGENTS ONLINE</div>
</header>
<main>
  <div class="label">MARKET QUERY</div>
  <div class="input-row">
    <input id="q" placeholder="Ask any market question..." onkeydown="if(event.key==='Enter')run()"/>
    <button class="run" id="runBtn" onclick="run()">DEPLOY</button>
  </div>
  <div class="examples">
    <button class="ex" onclick="setQ('Is Bitcoin a buy in 2026?')">Is Bitcoin a buy in 2026?</button>
    <button class="ex" onclick="setQ('Will NVIDIA outperform in 2026?')">Will NVIDIA outperform in 2026?</button>
    <button class="ex" onclick="setQ('Should I short the S&P 500?')">Should I short the S&P 500?</button>
    <button class="ex" onclick="setQ('Is gold entering a bull market?')">Is gold entering a bull market?</button>
  </div>
  <div id="rounds" class="rounds" style="display:none">
    <div class="round-pill" id="r1">R1 INIT</div>
    <div class="round-pill" id="r2">R2 DEBATE</div>
    <div class="round-pill" id="r3">R3 FINAL</div>
  </div>
  <div id="factionBar" style="display:none" class="faction-bar">
    <div class="faction-labels">
      <span id="bullLabel" style="color:#00ff87">▲ BULL 0%</span>
      <span id="neutLabel" style="color:#ffa502">◆ NEUTRAL 0%</span>
      <span id="bearLabel" style="color:#ff4757">▼ BEAR 0%</span>
    </div>
    <div class="bar">
      <div class="bar-bull" id="barBull" style="width:33%"></div>
      <div class="bar-neut" id="barNeut" style="width:34%"></div>
      <div class="bar-bear" id="barBear" style="width:33%"></div>
    </div>
    <div id="flipsMsg" class="flips"></div>
  </div>
  <div id="error" class="error" style="display:none"></div>
  <div id="loading" class="loading" style="display:none"><div class="spin">⬡</div><div style="font-size:11px;letter-spacing:3px;margin-top:12px">SWARM ANALYZING... THIS TAKES ~60 SECONDS</div></div>
  <div id="feedWrap" style="display:none">
    <div class="feed-title" id="feedTitle">LIVE DEBATE FEED</div>
    <div class="feed" id="feed"></div>
  </div>
  <div id="verdictEl" style="display:none"></div>
  <div id="idle" class="idle"><div class="idle-icon">⬡</div><div class="idle-text">1000 AGENTS STANDING BY</div></div>
</main>
<script>
const PC={bullish:'#00ff87',bearish:'#ff4757',neutral:'#ffa502'};
const PI={bullish:'▲',bearish:'▼',neutral:'◆'};

function setQ(v){document.getElementById('q').value=v;}

function setRound(r){
  [1,2,3].forEach(i=>{
    document.getElementById('r'+i).classList.toggle('active',i<=r);
  });
}

function updateFaction(t,flips){
  const total=(t.bullish||0)+(t.bearish||0)+(t.neutral||0);
  if(!total)return;
  const bull=Math.round((t.bullish||0)/total*100);
  const bear=Math.round((t.bearish||0)/total*100);
  const neut=100-bull-bear;
  document.getElementById('factionBar').style.display='block';
  document.getElementById('barBull').style.width=bull+'%';
  document.getElementById('barNeut').style.width=neut+'%';
  document.getElementById('barBear').style.width=bear+'%';
  document.getElementById('bullLabel').textContent=`▲ BULL ${bull}% (${t.bullish||0})`;
  document.getElementById('neutLabel').textContent=`◆ NEUTRAL ${neut}% (${t.neutral||0})`;
  document.getElementById('bearLabel').textContent=`▼ BEAR ${bear}% (${t.bearish||0})`;
  if(flips&&flips.length){
    document.getElementById('flipsMsg').textContent=`⚡ ${flips.length} group(s) flipped: ${flips.map(f=>`${f.name} (${f.from}→${f.to})`).join(', ')}`;
  }
}

function addCard(evt){
  const feed=document.getElementById('feed');
  const c=PC[evt.position];
  const div=document.createElement('div');
  div.className='card';
  div.style.borderLeft=`3px solid ${c}`;
  div.innerHTML=`
    <div class="card-header">
      <span class="card-name" style="color:${c}">${evt.name.toUpperCase()}</span>
      <span class="badge" style="background:${c}20;color:${c}">${PI[evt.position]} ${evt.position.toUpperCase()}</span>
      <span style="font-size:11px;color:#3a4455">${Math.round(evt.confidence*100)}%</span>
      ${evt.flipped?'<span class="flipped-tag">⚡ FLIPPED</span>':''}
      <span class="card-meta">R${evt.round} · ${evt.count} agents</span>
    </div>
    <div class="card-arg">${evt.argument}</div>
    <div class="card-signal">KEY SIGNAL: <span style="color:${c}">${evt.key_signal}</span></div>`;
  feed.appendChild(div);
  feed.scrollTop=feed.scrollHeight;
  document.getElementById('feedTitle').textContent=`LIVE DEBATE FEED · ${feed.children.length} TRANSMISSIONS`;
}

function showVerdict(v){
  const c=v.score>=60?'#00ff87':v.score>=40?'#ffa502':'#ff4757';
  const el=document.getElementById('verdictEl');
  el.style.display='block';
  el.innerHTML=`
    <div class="verdict-box" style="border:1px solid ${c}40;background:#0a1410;box-shadow:0 0 60px -20px ${c}">
      <div class="verdict-header">
        <span style="font-size:22px">⬡</span>
        <span style="color:${c};font-size:13px;font-weight:700;letter-spacing:3px">SWARM VERDICT</span>
        <span class="verdict-label" style="background:${c}25;color:${c}">${v.label}</span>
      </div>
      <div class="score-labels">
        <span>BEARISH</span>
        <span class="score-num" style="color:${c}">${v.score}/100</span>
        <span>BULLISH</span>
      </div>
      <div class="score-bar-bg"><div class="score-bar-fill" style="width:${v.score}%;background:${c};box-shadow:0 0 14px ${c}80"></div></div>
      <div class="stats">
        <div class="stat"><div class="stat-val" style="color:#00ff87">${v.bull_pct}%</div><div class="stat-label">BULL CAMP</div></div>
        <div class="stat"><div class="stat-val" style="color:#ff4757">${v.bear_pct}%</div><div class="stat-label">BEAR CAMP</div></div>
        <div class="stat"><div class="stat-val" style="color:#ffa502">${v.neut_pct}%</div><div class="stat-label">NEUTRAL</div></div>
      </div>
      <div class="cases">
        <div>
          <div class="case-title" style="color:#00ff87">▲ BULL CASE</div>
          ${(v.bull_args||[]).map(a=>`<div class="case-arg" style="border-color:#00ff8740">${a}</div>`).join('')}
        </div>
        <div>
          <div class="case-title" style="color:#ff4757">▼ BEAR CASE</div>
          ${(v.bear_args||[]).map(a=>`<div class="case-arg" style="border-color:#ff475740">${a}</div>`).join('')}
        </div>
      </div>
      <div class="verdict-footer">SYNTHESIZED FROM 1,000 AGENTS · 10 ARCHETYPES · 3 DEBATE ROUNDS</div>
    </div>`;
}

async function run(){
  const q=document.getElementById('q').value.trim();
  if(!q)return;
  document.getElementById('runBtn').disabled=true;
  document.getElementById('q').disabled=true;
  document.getElementById('idle').style.display='none';
  document.getElementById('error').style.display='none';
  document.getElementById('verdictEl').style.display='none';
  document.getElementById('feed').innerHTML='';
  document.getElementById('feedWrap').style.display='none';
  document.getElementById('factionBar').style.display='none';
  document.getElementById('flipsMsg').textContent='';
  document.getElementById('rounds').style.display='flex';
  document.getElementById('loading').style.display='block';
  setRound(0);

  try{
    const res=await fetch('/analyze',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question:q})
    });

    if(!res.ok){
      const txt=await res.text();
      throw new Error(`Server error ${res.status}: ${txt.slice(0,200)}`);
    }

    const reader=res.body.getReader();
    const decoder=new TextDecoder();
    let buf='';

    while(true){
      const {done,value}=await reader.read();
      if(done)break;
      buf+=decoder.decode(value,{stream:true});
      const lines=buf.split('\n');
      buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        try{
          const evt=JSON.parse(line.slice(6));
          if(evt.type==='round'){
            setRound(evt.round);
            document.getElementById('loading').style.display='none';
            document.getElementById('feedWrap').style.display='block';
          }
          if(evt.type==='agent')addCard(evt);
          if(evt.type==='tally')updateFaction(evt.tally,evt.flips);
          if(evt.type==='verdict')showVerdict(evt);
        }catch(e){}
      }
    }
  }catch(e){
    document.getElementById('error').style.display='block';
    document.getElementById('error').textContent='⚠ '+e.message;
  }finally{
    document.getElementById('runBtn').disabled=false;
    document.getElementById('q').disabled=false;
    document.getElementById('loading').style.display='none';
  }
}
</script>
</body>
</html>
